logger:
  logLevel: 'debug'
database:
  postgresql:
    host: 'localhost'
    port: 5432
    scheme: 'postgres'
    database: 'db_signare'
    username: 'postgres'
    password: '123456'
    sslmode: 'disable'
requestContext:
  userRequestHeader: 'X-Auth-RpcUserId'
  applicationRequestHeader: 'X-Auth-RpcApplicationId'
metrics:
  prometheus:
    port: 9092
    path: /metrics
    maxRequestInFlight: 10
    timeoutInMillis: 30000
    namespace: 'signer'
hsmmodules:
  softhsm:
    lib: '/usr/local/lib/softhsm/libsofthsm2.so'
